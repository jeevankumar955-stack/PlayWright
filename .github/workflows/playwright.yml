name: Playwright CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24 now

    steps:
      # Checkout code (latest version)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js (latest version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Cache Playwright browsers to speed up installs (stable key)
      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      # Debug check to confirm cache restore
      - name: Check Playwright cache
        run: ls -R ~/.cache/ms-playwright || echo "No cache found"

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Install Playwright browsers (uses cache if available)
      - name: Install Playwright browsers
        run: npx playwright install

      # Run Playwright tests (force headless mode to avoid XServer error)
      - name: Run Playwright tests
        run: npx playwright test --headless

      # Install Allure CLI
      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      # Generate Allure report
      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      # Upload Allure report as artifact (latest version)
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report